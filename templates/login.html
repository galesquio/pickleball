<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Pickleball Facility</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'DM Sans', sans-serif; }</style>
</head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl bg-teal-500/10 border border-teal-500/20 flex items-center justify-center text-4xl mx-auto mb-4">🏓</div>
      <h1 class="text-2xl font-bold text-white">Pickleball Facility</h1>
      <p class="text-gray-500 text-sm mt-1">Court & Racket Management</p>
    </div>

    <!-- Card -->
    <div class="bg-gray-900 rounded-2xl border border-gray-800 p-8">
      {% if error %}
      <div class="mb-5 flex items-center gap-2.5 p-3 bg-red-900/30 border border-red-800/50 text-red-400 rounded-lg text-sm">
        <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">Username</label>
          <input type="text" name="username" required autofocus
            class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg px-4 py-2.5 text-sm placeholder-gray-600 focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
          <input type="password" name="password" required
            class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg px-4 py-2.5 text-sm placeholder-gray-600 focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition">
        </div>
        <button type="submit"
          class="w-full bg-teal-600 hover:bg-teal-500 text-white font-semibold py-2.5 rounded-lg transition text-sm mt-1">
          Sign In
        </button>
      </form>
    </div>
  </div>
</body>
</html>
