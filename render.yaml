# Render Blueprint — PostgreSQL in production, SQLite when running locally.
#
# Local: omit DATABASE_URL → pickleball.db in the project folder.
# Render: DATABASE_URL is injected from the linked Postgres database below.

databases:
  - name: pickleball-db
    databaseName: pickleball
    user: pickleball
    plan: free

services:
  - type: web
    name: pickleball
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:create_app --factory --host 0.0.0.0 --port $PORT
    healthCheckPath: /login
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: RENDER
        value: "true"
      - key: PB_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pickleball-db
          property: connectionString
