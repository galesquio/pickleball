# Render Blueprint — SQLite (same as local desktop app)
#
# SQLite file: pickleball.db in the service directory (or /var/data if you add a disk).
#
# Free plan: data survives restarts but is RESET on each new deploy.
# For persistent data across deploys, use a paid plan and uncomment the disk block below.

services:
  - type: web
    name: pickleball
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:create_app --factory --host 0.0.0.0 --port $PORT
    healthCheckPath: /login
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: RENDER
        value: "true"
      - key: PB_SECRET_KEY
        generateValue: true
      # Optional: store DB on a mounted volume (paid plan + disk required)
      # - key: DATA_DIR
      #   value: /var/data
    # disk:
    #   name: pickleball-data
    #   mountPath: /var/data
    #   sizeGB: 1
